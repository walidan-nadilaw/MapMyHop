<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Trace route to instagram.com</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const hops = [{"hop":3,"ip":"182.253.99.1","latencyMs":9,"private":false,"geo":{"status":"success","country":"Indonesia","city":"Jakarta","lat":-6.20941,"lon":106.821,"isp":"BIZNET","query":"182.253.99.1"}},{"hop":5,"ip":"163.77.145.242","latencyMs":4,"private":false,"geo":{"status":"success","country":"Ireland","city":"Dublin","lat":53.3289,"lon":-6.23018,"isp":"Meta Platforms Ireland Limited","query":"163.77.145.242"}},{"hop":6,"ip":"129.134.45.34","latencyMs":11,"private":false,"geo":{"status":"success","country":"Indonesia","city":"Jakarta","lat":-6.19445,"lon":106.823,"isp":"Facebook, Inc.","query":"129.134.45.34"}},{"hop":7,"ip":"163.77.191.232","latencyMs":5,"private":false,"geo":{"status":"success","country":"Ireland","city":"Dublin","lat":53.3289,"lon":-6.23018,"isp":"Meta Platforms Ireland Limited","query":"163.77.191.232"}},{"hop":8,"ip":"163.77.191.242","latencyMs":18,"private":false,"geo":{"status":"success","country":"Ireland","city":"Dublin","lat":53.3289,"lon":-6.23018,"isp":"Meta Platforms Ireland Limited","query":"163.77.191.242"}},{"hop":9,"ip":"57.144.100.34","latencyMs":3,"private":false,"geo":{"status":"success","country":"Indonesia","city":"Jakarta","lat":-6.2114,"lon":106.8446,"isp":"Facebook, Inc.","query":"57.144.100.34"}}];
    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
    }).addTo(map);

    const latlngs = [];
    hops.forEach((h) => {
      const latlng = [h.geo.lat, h.geo.lon];
      latlngs.push(latlng);
      L.marker(latlng)
        .addTo(map)
        .bindPopup(
          '<b>Hop ' + h.hop + '</b><br>' + h.ip + '<br>' +
          h.geo.city + ', ' + h.geo.country + '<br>' + h.geo.isp
        );
    });

    if (latlngs.length > 1) {
      L.polyline(latlngs, { color: 'blue' }).addTo(map);
    }

    if (latlngs.length > 0) {
      map.fitBounds(latlngs, { padding: [40, 40] });
    } else {
      map.setView([20, 0], 2);
    }
  </script>
</body>
</html>
