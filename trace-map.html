<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Trace route to google.com</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const hops = [{"hop":3,"ip":"103.78.99.194","latencyMs":8,"private":false,"geo":{"status":"success","country":"Indonesia","city":"Jakarta","lat":-6.20247,"lon":106.844,"isp":"MORATELINDO","query":"103.78.99.194"}},{"hop":4,"ip":"103.83.6.21","latencyMs":34,"private":false,"geo":{"status":"success","country":"Indonesia","city":"Jakarta","lat":-6.20247,"lon":106.844,"isp":"MORATELINDO","query":"103.83.6.21"}},{"hop":5,"ip":"103.111.145.49","latencyMs":34,"private":false,"geo":{"status":"success","country":"Indonesia","city":"Jakarta","lat":-6.203,"lon":106.845,"isp":"CEPATNET","query":"103.111.145.49"}},{"hop":6,"ip":"103.111.145.50","latencyMs":43,"private":false,"geo":{"status":"success","country":"Indonesia","city":"Jakarta","lat":-6.203,"lon":106.845,"isp":"CEPATNET","query":"103.111.145.50"}},{"hop":7,"ip":"216.239.41.111","latencyMs":52,"private":false,"geo":{"status":"success","country":"United States","city":"Mountain View","lat":37.422,"lon":-122.084,"isp":"Google LLC","query":"216.239.41.111"}},{"hop":8,"ip":"74.125.242.176","latencyMs":33,"private":false,"geo":{"status":"success","country":"United States","city":"Mountain View","lat":37.4225,"lon":-122.085,"isp":"Google LLC","query":"74.125.242.176"}},{"hop":9,"ip":"66.249.95.248","latencyMs":39,"private":false,"geo":{"status":"success","country":"United States","city":"Mountain View","lat":37.4225,"lon":-122.085,"isp":"Google LLC","query":"66.249.95.248"}},{"hop":10,"ip":"216.239.54.109","latencyMs":36,"private":false,"geo":{"status":"success","country":"United States","city":"Mountain View","lat":37.422,"lon":-122.084,"isp":"Google LLC","query":"216.239.54.109"}},{"hop":11,"ip":"142.251.52.147","latencyMs":36,"private":false,"geo":{"status":"success","country":"United States","city":"Mountain View","lat":37.4225,"lon":-122.085,"isp":"Google LLC","query":"142.251.52.147"}},{"hop":18,"ip":"142.251.12.101","latencyMs":115,"private":false,"geo":{"status":"success","country":"United States","city":"Mountain View","lat":37.4225,"lon":-122.085,"isp":"Google LLC","query":"142.251.12.101"}}];
    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
    }).addTo(map);

    const latlngs = [];
    hops.forEach((h) => {
      const latlng = [h.geo.lat, h.geo.lon];
      latlngs.push(latlng);
      L.marker(latlng)
        .addTo(map)
        .bindPopup(
          '<b>Hop ' + h.hop + '</b><br>' + h.ip + '<br>' +
          h.geo.city + ', ' + h.geo.country + '<br>' + h.geo.isp
        );
    });

    if (latlngs.length > 1) {
      L.polyline(latlngs, { color: 'blue' }).addTo(map);
    }

    if (latlngs.length > 0) {
      map.fitBounds(latlngs, { padding: [40, 40] });
    } else {
      map.setView([20, 0], 2);
    }
  </script>
</body>
</html>
